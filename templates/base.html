<!doctype html>
<html lang="ja" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Frontier Radar{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  </head>
  <body>
    <div class="container-fluid">
      <div class="row min-vh-100">
        <aside class="col-lg-3 col-xl-2 sidebar py-4 px-3 border-end">
          <div class="d-flex align-items-center gap-2 mb-4">
            <div class="brand-mark">FR</div>
            <div>
              <h4 class="mb-0">Frontier Radar</h4>
              <p class="text-muted small mb-0">AIデータセンターの変化を追う</p>
            </div>
          </div>

          <nav class="nav flex-column gap-2">
            <a class="nav-link active" href="{{ url_for('home') }}">ダッシュボード</a>
            <a class="nav-link" href="#">今日の変化</a>
            <a class="nav-link" href="#">関連日本株</a>
            <a class="nav-link" href="#">ウォッチリスト</a>
          </nav>

          <div class="mt-5 p-3 rounded-4 panel-card">
            <p class="small text-muted mb-2">状態</p>
            <h6 class="mb-1">シグナル監視中</h6>
            <p class="small text-muted mb-0">AI・データセンター・半導体の動きを日次で追跡します。</p>
          </div>
        </aside>

        <main class="col-lg-9 col-xl-10 py-4 px-4 px-lg-5">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
